description: > # your text below (remove <br> elements if you don't need line breaks)
"I'm a proteomics researcher and platform builder with a focus on cell surface biology. My work centers on developing and applying mass spectrometry workflows to map the proteins that line the cell surface — the molecular interface through which cells sense and respond to their environment — uncovering biology that conventional approaches miss."
 <br><br>
"I've built tools including SurfaceGenie, DROPPS, CIRFESS, and SP2 to make specialized proteomics methods more accessible and reproducible across research contexts. My background spans cancer biology, cardiac proteomics, and multi-omic integration, working across both wet lab and computational domains."
 <br><br>
"I'm currently a Research Manager in the Gundry Laboratory at the University of Nebraska Medical Center in the Gundry Lab, where I lead mass spectrometry-based research projects and industry-sponsored collaborations. I also serve as the Director of the Bioassay Core as part of the Center for Heart & Vascular Research."
